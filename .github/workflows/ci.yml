name: CI
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Syntax-check all ES modules
        run: find . -path ./node_modules -prune -o -name '*.mjs' -print0 | xargs -0 -r -n1 node --check
